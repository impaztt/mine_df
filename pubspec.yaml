name: starlit_mine
description: "별빛 광산 - 꼬마 광부의 비밀 광산. 방치형 디펜스 RPG."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # === 게임 엔진 ===
  flame: ^1.18.0
  flame_audio: ^2.10.4

  # === 애니메이션 ===
  flutter_animate: ^4.5.0

  # === 상태 관리 ===
  flutter_riverpod: ^2.5.0

  # === 데이터 / 저장 ===
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # === 유틸 ===
  collection: ^1.18.0
  path_provider: ^2.1.0

  # === 한글 폰트 ===
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
